<script>

/* PAYMENT /

async function buy(){

const phone=document.getElementById("phone").value

if(!phone){
alert("Enter phone number")
return
}

document.getElementById("loading").style.display="block"
document.getElementById("success").style.display="none"

try{

const response=await fetch("https://unlockvip-backend.onrender.com/create-payment",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
amount:3000,
phone:phone
})

})

const result=await response.json()

document.getElementById("loading").style.display="none"

if(result.success){
document.getElementById("success").style.display="block"
}else{
alert(result.error||"Payment failed")
}

}catch(error){

document.getElementById("loading").style.display="none"
alert("Server error")

}

}


/ NETWORK AUTO DETECT /

const phoneInput=document.getElementById("phone")
const cards=document.querySelectorAll(".card")

/ TANZANIA PREFIX LIST */

const halotelPrefixes = ["061"]

const airtelPrefixes = [
"062","066","068","069","078"
]

const yasPrefixes = [
"065","067","071","077"
]

phoneInput.addEventListener("input",()=>{

const number=phoneInput.value

cards.forEach(card=>{
card.classList.remove("active-network")
})

const prefix = number.substring(0,3)

if(halotelPrefixes.includes(prefix)){
activate("halotel")
}

else if(airtelPrefixes.includes(prefix)){
activate("airtel")
}

else if(yasPrefixes.includes(prefix)){
activate("yas")
}

})

function activate(network){

cards.forEach(card=>{

if(card.dataset.network===network){
card.classList.add("active-network")
}

})

}

</script>
